[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini — project-level pytest configuration
# ─────────────────────────────────────────────────────────────────────────────

# Add the project root to sys.path so `from src.xxx import yyy` works in tests
# without requiring `pip install -e .`
pythonpath = .

testpaths  = tests
addopts    = -v --tb=short

# Ignore slow integration tests by default; run with -m integration to include
markers =
    integration: marks tests that require the full dataset or GPU (slow)
    unit: marks fast, self-contained unit tests
